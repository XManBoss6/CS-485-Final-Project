<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>TypescriptTest - Index</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-xl-8">

          <form class="needs-validation" novalidate>
            <div class="card mb-4 border-0 shadow-sm">
              <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-3">
                  <div>
                    <h2 class="h5 mb-1">Credit Card</h2>
                  </div>
                </div>

                <div class="row g-3">
                  <div class="col-12">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                      <label for="cardNumber" class="form-label mb-0">Credit card number</label>
                      <span id="cardTypeIndicator" class="badge bg-secondary" style="display: none;"></span>
                    </div>
                    <input type="text" class="form-control form-control-lg" id="cardNumber" placeholder="1234 5678 9012 3456" inputmode="numeric" pattern="[0-9 ]{13,19}" required>
                    <div class="invalid-feedback">Enter a valid card number.</div>
                  </div>

                  <div class="col-md-3">
                    <label for="expiryDate" class="form-label">Expiry (MM / YY)</label>
                    <input type="text" class="form-control form-control-lg" id="expiryDate" placeholder="MM / YY" pattern="^(0[1-9]|1[0-2])\s?/\s?\d{2}$" required>
                    <div class="invalid-feedback">Enter expiry as MM / YY.</div>
                  </div>

                  <div class="col-md-3">
                    <label for="cvc" class="form-label">Security Code</label>
                    <input type="text" class="form-control form-control-lg" id="cvc" placeholder="123" inputmode="numeric" pattern="\d{3,4}" required>
                    <div class="invalid-feedback">Enter the 3- or 4-digit code.</div>
                  </div>

                </div>

                <div class="row g-4 mt-1">
                  <div class="col-md-12">
                    <label for="cardName" class="form-label">Name on card</label>
                    <input type="text" class="form-control form-control-lg" id="cardName" placeholder="Full name" inputmode="latin" pattern="[a-zA-Z\s]{2,100}" required>
                    <div class="invalid-feedback">Name on card is required.</div>
                  </div>
                </div>
                
              </div>
            </div>

            <div class="card mb-4 border-0 shadow-sm">
              <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-3">
                  <div>
                    <h2 class="h5 mb-1">Billing Address</h2>
                  </div>
                </div>

                <div class="row g-3">
                  <div class="row g-4 mt-1">
                  <div class="col-md-12">
                    <label for="cardName" class="form-label">Full Name</label>
                    <input type="text" class="form-control form-control-lg" id="cardName" placeholder="Full Name" inputmode="latin" pattern="[a-zA-Z\s]{2,100}" required>
                    <div class="invalid-feedback">Name on card is required.</div>
                  </div>
                </div>
                    <div class="col-12">
                    <label for="billingAddress" class="form-label">Street address</label>
                    <input type="text" class="form-control form-control-lg" id="billingAddress" placeholder="123 Main St" required>
                    <div class="invalid-feedback">Street address is required.</div>
                  </div>

                  <div class="col-12">
                    <label for="billingAddress2" class="form-label"> Apt / Suite / Other (optional)</label>
                    <input type="text" class="form-control form-control-lg" id="billingAddress2" placeholder="Apartment or suite">
                  </div>

                  <div class="col-md-6">
                    <label for="billingCity" class="form-label">City</label>
                    <input type="text" class="form-control form-control-lg" id="billingCity" required>
                    <div class="invalid-feedback">City is required.</div>
                  </div>

                  <div class="col-md-3">
                    <label for="billingState" class="form-label">State / Province</label>
                    <input type="text" class="form-control form-control-lg" id="billingState" required>
                    <div class="invalid-feedback">State or province is required.</div>
                  </div>

                  <div class="col-md-3">
                    <label for="billingZip" class="form-label">ZIP / Postal code</label>
                    <input type="text" class="form-control form-control-lg" id="billingZip" required>
                    <div class="invalid-feedback">ZIP or postal code is required.</div>
                  </div>

                </div>
              </div>
            </div>

            <div class="d-flex justify-content-end">
              <button class="btn btn-dark btn-lg px-5" type="submit">Complete Payment</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/dist/index.js"></script>
    <script>
      (function () {
        'use strict'
        var forms = document.querySelectorAll('.needs-validation')
        Array.prototype.slice.call(forms).forEach(function (form) {
          form.addEventListener('submit', function (event) {
            if (!form.checkValidity()) {
              event.preventDefault()
              event.stopPropagation()
            }
            form.classList.add('was-validated')
          }, false)
        })
      })()
    </script>
  </body>
</html>
