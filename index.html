<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Credit Card Checkout</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    .card-type-display {
      display: flex;
      align-items: center;
    }

    .card-type-logo {
      height: 32px;
      object-fit: contain;
    }
  </style>
</head>

<body class="bg-light">

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-xl-8">

      <form class="needs-validation" novalidate>

        <!-- ================= CARD INFO ================= -->
        <div class="card mb-4 border-0 shadow-sm">
          <div class="card-body">

            <h2 class="h5 mb-4">Payment Details</h2>

            <!-- Card Number -->
            <div class="mb-3">
              <div class="d-flex justify-content-between align-items-center mb-2">
                <label for="cardNumber" class="form-label mb-0">Card Number</label>

                <div id="cardTypeIndicator" class="card-type-display" display="none">
                  <img id="cardTypeImage" src="" class="card-type-logo" alt="Card type">
                </div>
              </div>

              <input
                id="cardNumber"
                type="text"
                class="form-control form-control-lg"
                placeholder="1234 5678 9012 3456"
                inputmode="numeric"
                required
              />

              <div class="invalid-feedback">
                Please enter a valid credit card number.
              </div>
            </div>

            <!-- Expiry + CVC -->
            <div class="row g-3">

              <div class="col-md-6">
                <label for="expiryDate" class="form-label">Expiry (MM/YY)</label>
                <input
                  id="expiryDate"
                  type="text"
                  class="form-control form-control-lg"
                  placeholder="MM / YY"
                  required
                />
                <div class="invalid-feedback">
                  Enter a valid expiry date.
                </div>
              </div>

              <div class="col-md-6">
                <label for="cvc" class="form-label">CVC</label>
                <input
                  id="cvc"
                  type="text"
                  class="form-control form-control-lg"
                  inputmode="numeric"
                  required
                />
                <div class="invalid-feedback">
                  Enter a valid CVC.
                </div>
              </div>

            </div>

            <!-- Name on card -->
            <div class="mt-3">
              <label for="cardName" class="form-label">Name on Card</label>
              <input
                id="cardName"
                type="text"
                class="form-control form-control-lg"
                required
              />
              <div class="invalid-feedback">
                Name on card is required.
              </div>
            </div>

          </div>
        </div>

        <!-- ================= BILLING ================= -->
        <div class="card mb-4 border-0 shadow-sm">
          <div class="card-body">

            <h2 class="h5 mb-4">Billing Address</h2>

            <div class="row g-3">

              <div class="col-md-6">
                <label for="firstName" class="form-label">First Name</label>
                <input id="firstName" type="text" class="form-control form-control-lg" required />
                <div class="invalid-feedback">Required.</div>
              </div>

              <div class="col-md-6">
                <label for="lastName" class="form-label">Last Name</label>
                <input id="lastName" type="text" class="form-control form-control-lg" required />
                <div class="invalid-feedback">Required.</div>
              </div>

              <div class="col-12">
                <label for="address" class="form-label">Address</label>
                <input id="address" type="text" class="form-control form-control-lg" required />
                <div class="invalid-feedback">Required.</div>
              </div>

              <div class="col-md-6">
                <label for="city" class="form-label">City</label>
                <input id="city" type="text" class="form-control form-control-lg" required />
                <div class="invalid-feedback">Required.</div>
              </div>

              <div class="col-md-3">
                <label for="state" class="form-label">State</label>
                <select id="state" class="form-select form-select-lg" required>
                  <option value=""></option>
                  <option>MN</option>
                  <option>CA</option>
                  <option>NY</option>
                </select>
                <div class="invalid-feedback">Required.</div>
              </div>

              <div class="col-md-3">
                <label for="zip" class="form-label">ZIP</label>
                <input id="zip" type="text" class="form-control form-control-lg" required />
                <div class="invalid-feedback">Required.</div>
              </div>

            </div>
          </div>
        </div>

        <!-- ================= SUBMIT ================= -->
        <div class="d-flex justify-content-end">
          <button class="btn btn-danger btn-lg px-5" type="submit">
            Complete Payment
          </button>
        </div>

      </form>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/dist/index.js"></script>

</body>
</html>
